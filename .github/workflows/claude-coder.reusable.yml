name: Claude Coder (reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        type: number
        required: true
      issue_title:
        type: string
        required: true
      issue_body:
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  code:
    name: Implement issue
    runs-on: [self-hosted, macOS]
    if: github.event.issue.state == 'open'
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
      ISSUE_BODY: ${{ inputs.issue_body }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Implement and open PR
        run: |
          printf '%s\n' "$ISSUE_BODY" > /tmp/issue-body.txt
          PROMPT="You are a senior software engineer working on the repository $REPO.

You have been assigned GitHub issue #$ISSUE_NUMBER: $ISSUE_TITLE

Issue description:
$(cat /tmp/issue-body.txt)

Your job:
1. Read the relevant source files to understand the codebase structure and conventions.
2. Check CLAUDE.md, AGENTS.md, or CONTRIBUTING.md if they exist.
3. Create a feature branch: git checkout -b issue-$ISSUE_NUMBER
4. Implement the changes that resolve the issue. Stay tightly scoped — only change what the issue requires.
5. Write or update tests for your changes if the repo has a test suite.
6. Commit: git add -A && git commit -m 'Implement: $ISSUE_TITLE (#$ISSUE_NUMBER)'
7. Push: git push -u origin issue-$ISSUE_NUMBER
8. Open a PR with: gh pr create --title '$ISSUE_TITLE (#$ISSUE_NUMBER)' --body 'Resolves #$ISSUE_NUMBER\n\n[Brief description of what changed and why]' --base main
9. After the PR is open, comment on the issue with the PR link: gh issue comment $ISSUE_NUMBER --body 'PR opened: [paste the PR URL here]'

Rules:
- NEVER push to main directly.
- NEVER close the issue yourself — the Overseer will close it on merge.
- If the issue is ambiguous, make reasonable assumptions and document them in the PR body.
- The PR will be reviewed by the Overseer. If changes are needed, you will receive a separate task.

Begin."

          claude --print \
            --model claude-opus-4-6 \
            --effort xhigh \
            --max-turns 80 \
            --dangerously-skip-permissions \
            --output-format text \
            "$PROMPT"
