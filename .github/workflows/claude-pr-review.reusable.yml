name: Claude PR Review (reusable)

on:
  workflow_call: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

defaults:
  run:
    shell: bash

jobs:
  review:
    name: Strict Claude code audit
    runs-on: self-hosted
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Claude reviewer
        run: |
          PROMPT=$(echo "" | base64 -d)
          claude --print \
            --model claude-opus-4-6 \
            --effort xhigh \
            --max-turns 40 \
            --dangerously-skip-permissions \
            --output-format text \
            "$PROMPT"
