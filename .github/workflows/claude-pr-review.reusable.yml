name: Claude PR Review (reusable)

on:
  workflow_call: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    name: Strict Claude code audit
    runs-on: self-hosted
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Add Git bash to PATH
        shell: powershell
        run: echo "C:\Program Files\Git\bin" | Add-Content -Path $env:GITHUB_PATH -Value 'C:Program FilesGitbin'

      - name: Run Claude reviewer
        shell: bash
        run: |
          PROMPT=$(echo "" | base64 -d)
          claude --print \
            --model claude-opus-4-6 \
            --effort xhigh \
            --max-turns 40 \
            --dangerously-skip-permissions \
            --output-format text \
            "$PROMPT"
