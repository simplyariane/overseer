name: Claude PR Review (reusable)

on:
  workflow_call: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    name: Strict Claude code audit
    runs-on: [self-hosted, Windows]
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Add tools to PATH
        shell: powershell
        run: |
          'C:\Program Files\Git\bin',
          'C:\Users\ariane\AppData\Local\Packages\Claude_pzs8sxrjxfjjc\LocalCache\Roaming\npm',
          'C:\Program Files\GitHub CLI' |
          Add-Content -Path $env:GITHUB_PATH

      - name: Run Claude reviewer
        shell: bash
        run: |
          PROMPT="You are a strict senior staff engineer and the final gatekeeper before code merges to main.
Every PR — from humans and AI agents alike — must pass your audit. Your verdict is binding.

Step 1 - Gather context:
  gh pr view \$PR_NUMBER --json title,body,files,additions,deletions,commits,author
  gh pr diff \$PR_NUMBER
For every file in the diff, read the FULL file, not just the hunk.

Step 2 - Audit. Flag every issue as [BLOCKER] or [NIT].

1. Correctness: logic bugs, off-by-ones, wrong edge cases, broken error paths,
   race conditions, unhandled nulls, swapped arguments.
2. Security: command injection, SQLi, XSS, SSRF, path traversal, auth bypass,
   secret/credential exposure, unsafe deserialization, unvalidated user input, regex DoS.
3. Test coverage: every changed/added code path with non-trivial logic needs a test.
   Tests must actually exercise the change (no trivial asserts, no over-mocking).
4. Breaking changes: anything removed or renamed that callers in the repo depend on.
   Search the repo for usages before concluding something is safe to remove.
5. Scope: unrelated refactors, drive-by reformatting, commented-out code, dead code,
   or unresolved TODOs all block approval.
6. Repo conventions: read CLAUDE.md, AGENTS.md, CONTRIBUTING.md and neighboring code.
   Deviations must be justified in the PR description.
7. Quality: unclear naming, silent error swallowing, ignored type/lint errors, missing
   handling of documented error cases.

Rules:
- Minor style nits do NOT block approval.
- Anything in categories 1-5 IS a blocker.
- Tie goes to REQUEST CHANGES.
- NEVER approve if non-trivial logic is added without tests.
- If a secret or credential appears anywhere in the diff, flag as [SECURITY BLOCKER]
  and request changes immediately regardless of anything else.

Step 3 - Write /tmp/verdict.md with this exact structure:

--- IF APPROVING ---
## Overseer Verdict: APPROVED

[One paragraph: what was reviewed, what checks passed, confidence level.]

[NIT]s (if any, non-blocking):
- file:line — description
---

--- IF REQUESTING CHANGES ---
## Overseer Verdict: CHANGES REQUIRED

[One paragraph executive summary of why this PR cannot merge.]

### Blockers (must all be resolved before re-review)

1. [BLOCKER] \`file.ext:line\` — **What is wrong**: ... **Exact fix**: ...
2. [BLOCKER] \`file.ext:line\` — **What is wrong**: ... **Exact fix**: ...
...

### Nits (optional, non-blocking)
- \`file.ext:line\` — ...
---

Step 4 - Post the verdict and act on it:

If zero BLOCKERs:
  gh pr review \$PR_NUMBER --approve --body-file /tmp/verdict.md
  # Find any issue linked by 'Resolves #N' or 'Closes #N' in the PR body
  LINKED_ISSUE=\$(gh pr view \$PR_NUMBER --json body --jq '.body' | grep -oE '(Resolves|Closes|Fixes) #[0-9]+' | grep -oE '[0-9]+' | head -1)
  gh pr merge \$PR_NUMBER --squash --delete-branch --subject \"\$(gh pr view \$PR_NUMBER --json title --jq .title) (#\$PR_NUMBER)\" --body \"Auto-merged after clean Overseer audit.\"
  # Close the linked issue if found
  if [ -n \"\$LINKED_ISSUE\" ]; then
    gh issue close \"\$LINKED_ISSUE\" --comment \"Resolved by PR #\$PR_NUMBER. Merged to main after Overseer approval.\"
  fi

If any BLOCKERs:
  gh pr review \$PR_NUMBER --request-changes --body-file /tmp/verdict.md
  # Extract just the blockers section from verdict.md for the fix issue
  BLOCKERS=\$(sed -n '/### Blockers/,/### Nits/p' /tmp/verdict.md | head -n -1)
  # Create a new issue tagged agent-fix so the coding agent picks it up
  gh issue create \
    --title \"🔧 Fix needed: PR #\$PR_NUMBER — \$PR_TITLE\" \
    --body \"The Overseer has rejected PR #\$PR_NUMBER. The coding agent must fix the following blockers and push to branch \`\$HEAD_REF\`.

**PR:** #\$PR_NUMBER
**Branch:** \`\$HEAD_REF\`

\$BLOCKERS

---
*After pushing your fixes, the Overseer will automatically re-review.*\" \
    --label \"agent-fix\"

Begin."

          claude --print \
            --model claude-opus-4-6 \
            --effort xhigh \
            --max-turns 40 \
            --dangerously-skip-permissions \
            --output-format text \
            "$PROMPT"
